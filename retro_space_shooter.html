<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Survivor Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            border: 2px solid #0f0;
            cursor: crosshair;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        
        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border: 2px solid #0f0;
            z-index: 20;
        }
        
        #gameOver h2, #startScreen h2 {
            color: #0f0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #0a0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Score: <span id="score">0</span></div>
            <div>Weapon Level: <span id="weaponLevel">1</span></div>
            <div>Shields: <span id="shields">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        
        <div id="startScreen">
            <h2>RETRO SURVIVOR SPACE SHOOTER</h2>
            <p>Move mouse to control ship</p>
            <p>Auto-fire enabled</p>
            <p>Collect power-ups to upgrade weapons</p>
            <button onclick="startGame()">START GAME</button>
        </div>
        
        <div id="gameOver" class="hidden">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p id="newHighScore" class="hidden">NEW HIGH SCORE!</p>
            <button onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== GAME CONFIGURATION ==========

        const WEAPON_POSITIONS = {

            // Waves configuration

                {
                    name: "Wave 11: Kamikaze Storm",
                    enemies: [
                        { type: 'KAMIKAZE', count: 30, delay: 40 },

                    ],
                    spawnInterval: 35
                },
                {
                    name: "Wave 12: Elite Assault",
                    enemies: [
                        { type: 'SHIELDED', count: 15, delay: 100 },
                        { type: 'SPECIAL', count: 12, delay: 120 },
                        { type: 'SNIPER', count: 10, delay: 140 }
                    ],
                    spawnInterval: 40
                },
                {
                    name: "Wave 13: Tank Battalion",
                    enemies: [
                        { type: 'TANK', count: 15, delay: 120 },
                        { type: 'BOSS_MINI', count: 5, delay: 200 },

                    ],
                    spawnInterval: 35
                },
                {
                    name: "Wave 14: Ultimate Swarm",
                    enemies: [
                        { type: 'SCOUT', count: 40, delay: 40 },
                        { type: 'KAMIKAZE', count: 35, delay: 40 },
                        { type: 'SNIPER', count: 15, delay: 100 }
                    ],

                },
                {
                    name: "Wave 15: Final Confrontation",
                    enemies: [
                        { type: 'BOSS_MINI', count: 8, delay: 100 },
                        { type: 'TANK', count: 20, delay: 100 },

        // ==========================================
        
        // Responsive canvas
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth - 20, GAME_CONFIG.GAME_SETTINGS.CANVAS_WIDTH_MAX);
            canvas.height = Math.min(window.innerHeight - 20, GAME_CONFIG.GAME_SETTINGS.CANVAS_HEIGHT_MAX);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('spaceShooterHighScore') || 0;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height - 100;
        let gameTime = 0;
        let difficulty = 1;
        
        // Wave state
        let currentWave = 0;
        let waveTimer = 0;
        let waveEnemiesToSpawn = [];
        let isWaveActive = false;
        let waveMessageTimer = 0;
        
        // Update high score display
        document.getElementById('highScore').textContent = highScore;
        
        // Particle system for explosions
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 3 + 1;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= 0.02;
                this.size *= 0.98;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }
        
        let particles = [];
        
        function createExplosion(x, y, color = '#ff0', count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }
        
        // Player class
        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 100;
                this.width = 20;
                this.height = 20;
                this.weaponLevel = 1;
                this.fireRate = 10;
                this.fireCounter = 0;
                this.missileFireCounter = 0;
                this.rifleFireCounter = 0;
                this.speed = 5;
                
                // Shield state
                this.shieldCharges = 0;
                this.shieldTimer = 0;
                this.isShieldActive = false;
            }
            
            update() {
                // Smooth movement towards mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                this.x += dx * 0.1;
                this.y += dy * 0.1;
                
                // Keep player in bounds
                this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
                this.y = Math.max(this.height/2, Math.min(canvas.height - this.height/2, this.y));
                
                // Shield logic
                if (this.isShieldActive) {
                    this.shieldTimer--;
                    if (this.shieldTimer <= 0) {
                        this.isShieldActive = false;
                    }
                }
                
                // Auto-fire for basic bullets
                this.fireCounter++;
                const fireRate = GAME_CONFIG.WEAPON_CONFIG.FIRE_RATES[this.weaponLevel] || GAME_CONFIG.WEAPON_CONFIG.FIRE_RATES.default;
                if (this.fireCounter >= fireRate) {
                    this.shootBasicBullets();
                    this.fireCounter = 0;
                }
                
                // Auto-fire for missiles
                if (GAME_CONFIG.WEAPON_CONFIG.MISSILES.levels.includes(this.weaponLevel)) {
                    this.missileFireCounter++;
                    const missileFireRate = GAME_CONFIG.WEAPON_CONFIG.MISSILE_FIRE_RATES[this.weaponLevel] || GAME_CONFIG.WEAPON_CONFIG.MISSILE_FIRE_RATES.default;
                    if (this.missileFireCounter >= missileFireRate) {
                        this.shootMissiles();
                        this.missileFireCounter = 0;
                    }
                }
                
                // Auto-fire for rifles
                if (GAME_CONFIG.WEAPON_CONFIG.RIFLES.levels.includes(this.weaponLevel)) {
                    this.rifleFireCounter++;
                    const rifleFireRate = GAME_CONFIG.WEAPON_CONFIG.RIFLE_FIRE_RATES[this.weaponLevel] || GAME_CONFIG.WEAPON_CONFIG.RIFLE_FIRE_RATES.default;
                    if (this.rifleFireCounter >= rifleFireRate) {
                        this.shootRifles();
                        this.rifleFireCounter = 0;
                    }
                }
            }
            
            shootBasicBullets() {
                const pattern = GAME_CONFIG.WEAPON_CONFIG.PATTERNS[this.weaponLevel] || GAME_CONFIG.WEAPON_CONFIG.PATTERNS.default;
                
                pattern.forEach(bullet => {
                    bullets.push(new Bullet(this.x + bullet.x, this.y + bullet.y, bullet.vx, bullet.vy));
                });
            }
            
            shootMissiles() {
                const positions = GAME_CONFIG.WEAPON_CONFIG.MISSILES.getPosition();
                positions.forEach(offset => {
                    missiles.push(new Missile(this.x + offset, this.y - this.height/2));
                });
            }
            
            shootRifles() {
                const positions = GAME_CONFIG.WEAPON_CONFIG.RIFLES.getPosition();
                positions.forEach((offset, index) => {
                    const direction = index === 0 ? 'left' : 'right';
                    rifles.push(new Rifle(this.x + offset, this.y - this.height/2, direction));
                });
            }
            
            
            activateShield() {
                if (this.shieldCharges > 0 && !this.isShieldActive) {
                    this.shieldCharges--;
                    this.isShieldActive = true;
                    this.shieldTimer = GAME_CONFIG.SHIELD_CONFIG.DURATION;
                    createExplosion(this.x, this.y, GAME_CONFIG.SHIELD_CONFIG.STROKE, 15);
                }
            }
            
            takeDamage() {
                if (this.isShieldActive) return false;
                
                this.weaponLevel--;
                if (this.weaponLevel < 1) {
                    this.weaponLevel = 1;
                    return true; // Game over
                }
                createExplosion(this.x, this.y, '#f00', 30);
                return false;
            }
            
            upgradeWeapon() {
                this.weaponLevel++;
                createExplosion(this.x, this.y, '#0f0', 15);
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw ship as triangle
                ctx.fillStyle = '#0f0';
                ctx.beginPath();
                ctx.moveTo(0, -this.height/2);
                ctx.lineTo(-this.width/2, this.height/2);
                ctx.lineTo(this.width/2, this.height/2);
                ctx.closePath();
                ctx.fill();
                
                // Draw engine glow
                ctx.fillStyle = '#0ff';
                ctx.fillRect(-3, this.height/2, 2, 5);
                ctx.fillRect(1, this.height/2, 2, 5);
                
                // Draw active shield
                if (this.isShieldActive) {
                    ctx.restore(); // Exit relative translation to draw at absolute
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, GAME_CONFIG.SHIELD_CONFIG.RADIUS, 0, Math.PI * 2);
                    ctx.fillStyle = GAME_CONFIG.SHIELD_CONFIG.COLOR;
                    ctx.fill();
                    ctx.strokeStyle = GAME_CONFIG.SHIELD_CONFIG.STROKE;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Shield pulse effect
                    const pulse = Math.sin(gameTime * 0.1) * 5;
                    ctx.beginPath();
                    ctx.arc(0, 0, GAME_CONFIG.SHIELD_CONFIG.RADIUS + pulse, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        // Bullet class
        class Bullet {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.width = 4;
                this.height = 8;
                this.active = true;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y < 0 || this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
                    this.active = false;
                }
            }
            
            draw() {
                ctx.fillStyle = '#ff0';
                ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
            }
        }
        
        // Missile class (homing)
        class Missile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 8;
                this.vx = 0;
                this.vy = -GAME_CONFIG.MISSILE_CONFIG.INITIAL_SPEED;
                this.target = null;
                this.active = true;
                this.life = GAME_CONFIG.MISSILE_CONFIG.LIFE;
            }
            
            update() {
                this.life--;
                if (this.life <= 0) {
                    this.active = false;
                    return;
                }
                
                // Find nearest enemy
                if (!this.target || !this.target.active) {
                    let minDist = Infinity;
                    enemies.forEach(enemy => {
                        if (enemy.active) {
                            const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                            if (dist < minDist) {
                                minDist = dist;
                                this.target = enemy;
                            }
                        }
                    });
                }
                
                // Home towards target
                if (this.target && this.target.active) {
                    const dx = this.target.x - this.x;
                    const dy = this.target.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist > 0) {
                        this.vx += (dx / dist) * GAME_CONFIG.MISSILE_CONFIG.HOMING_STRENGTH;
                        this.vy += (dy / dist) * GAME_CONFIG.MISSILE_CONFIG.HOMING_STRENGTH;
                    }
                }
                
                // Limit speed
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > GAME_CONFIG.MISSILE_CONFIG.MAX_SPEED) {
                    this.vx = (this.vx / speed) * GAME_CONFIG.MISSILE_CONFIG.MAX_SPEED;
                    this.vy = (this.vy / speed) * GAME_CONFIG.MISSILE_CONFIG.MAX_SPEED;
                }
                
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y < 0 || this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
                    this.active = false;
                }
            }
            
            draw() {
                ctx.fillStyle = '#0f0';
                ctx.fillRect(this.x - 2, this.y - 4, 4, 8);
            }
        }
        
        // Rifle class (straight fast projectiles)
        class Rifle {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.width = 3;
                this.height = 10;
                
                // Set velocity based on direction
                if (direction === 'left') {
                    this.vx = -3;
                    this.vy = -12;
                } else if (direction === 'right') {
                    this.vx = 3;
                    this.vy = -12;
                } else {
                    this.vx = 0;
                    this.vy = -15;
                }
                
                this.active = true;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y < 0 || this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
                    this.active = false;
                }
            }
            
            draw() {
                ctx.fillStyle = '#0ff';
                ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
            }
        }
        
        // Enemy class
        class Enemy {
            constructor(type, x, y) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.config = GAME_CONFIG.ENEMY_TYPES[type];
                this.hp = this.config.hp * difficulty;
                this.maxHp = this.hp;
                this.width = this.config.size;
                this.height = this.config.size;
                this.active = true;
                this.shootCounter = 0;
                this.pattern = Math.random() * Math.PI * 2;
                this.kamikazeTimer = 0;
                this.givingUp = false;
            }
            
            update() {
                // Movement patterns based on type
                switch(this.type) {
                    case 'STANDARD':
                        this.y += this.config.speed;
                        this.x += Math.sin(this.pattern) * 2;
                        this.pattern += 0.1;
                        break;
                    case 'SNIPER':
                        // Move horizontally across the screen
                        this.x += Math.sin(this.pattern) * this.config.speed;
                        this.pattern += 0.05;
                        
                        // Slowly move down
                        this.y += this.config.speed * 0.3;
                        break;
                    case 'KAMIKAZE':
                        this.kamikazeTimer++;
                        
                        // Give up after 3 seconds (180 frames at 60fps)
                        if (this.kamikazeTimer > 180 && !this.givingUp) {
                            this.givingUp = true;
                        }
                        
                        if (this.givingUp) {
                            // Fly away
                            this.y += this.config.speed * 2;
                            this.x += Math.sin(this.pattern) * 4;
                            this.pattern += 0.1;
                        } else {
                            // Attack player
                            const dx = player.x - this.x;
                            const dy = player.y - this.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist > 0) {
                                this.x += (dx / dist) * this.config.speed;
                                this.y += (dy / dist) * this.config.speed;
                            }
                        }
                        break;
                    case 'TANK':
                        this.y += this.config.speed;
                        break;
                    case 'SPECIAL':
                        this.y += this.config.speed;
                        this.x += Math.cos(this.pattern) * 3;
                        this.pattern += 0.05;
                        break;
                    case 'SHIELDED':
                        this.y += this.config.speed;
                        this.x += Math.sin(this.pattern * 0.5) * 1.5;
                        this.pattern += 0.02;
                        break;
                    case 'SCOUT':
                        this.y += this.config.speed;
                        // Fast zig-zag
                        this.x += Math.sin(this.pattern * 2) * 6;
                        this.pattern += 0.15;
                        break;
                    case 'BOSS_MINI':
                        // Slow approach then hover
                        if (this.y < 100) {
                            this.y += this.config.speed;
                        } else {
                            this.x += Math.sin(this.pattern * 0.3) * 2;
                            this.pattern += 0.05;
                            // Occasionally move slightly down
                            if (Math.random() < 0.01) this.y += 5;
                        }
                        break;
                }
                
                // Shooting
                if (this.config.shootRate > 0) {
                    this.shootCounter++;
                    if (this.shootCounter >= this.config.shootRate) {
                        this.shoot();
                        this.shootCounter = 0;
                    }
                }
                
                // Remove if off screen
                if (this.y > canvas.height + 50 || this.x < -50 || this.x > canvas.width + 50) {
                    this.active = false;
                }
            }
            
            shoot() {
                if (this.type === 'SNIPER') {
                    // Aim at player
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    enemyBullets.push(new EnemyBullet(this.x, this.y, (dx / dist) * 5, (dy / dist) * 5));
                } else if (this.type === 'SPECIAL') {
                    // Circular pattern
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        enemyBullets.push(new EnemyBullet(this.x, this.y, Math.cos(angle) * 4, Math.sin(angle) * 4));
                    }
                } else if (this.type === 'SHIELDED' || this.type === 'SCOUT') {
                    // Standard shot at player (only if player is below)
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > 0 && dy > 0) {  // Only shoot if player is below
                        enemyBullets.push(new EnemyBullet(this.x, this.y, (dx / dist) * 4, (dy / dist) * 4));
                    }
                } else if (this.type === 'BOSS_MINI') {
                    // Triple shot
                    const baseAngle = Math.atan2(player.y - this.y, player.x - this.x);
                    for (let i = -1; i <= 1; i++) {
                        const angle = baseAngle + i * 0.2;
                        enemyBullets.push(new EnemyBullet(this.x, this.y, Math.cos(angle) * 5, Math.sin(angle) * 5));
                    }
                }
            }
            
            takeDamage(damage = 1) {
                this.hp -= damage;
                if (this.hp <= 0) {
                    this.active = false;
                    score += this.config.score;
                    createExplosion(this.x, this.y, this.config.color, 15);
                    
                    // Drop power-up chance
                    const dropChance = GAME_CONFIG.DROP_CONFIG.POWER_UP_CHANCE;
                    const guaranteedDrop = GAME_CONFIG.DROP_CONFIG.TANK_GUARANTEED && this.type === 'TANK';
                    
                    if (Math.random() < dropChance || guaranteedDrop) {
                        powerUps.push(new PowerUp(this.x, this.y));
                    }
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw enemy based on type
                ctx.fillStyle = this.config.color;
                
                if (this.type === 'STANDARD' || this.type === 'KAMIKAZE') {
                    // Diamond shape
                    ctx.beginPath();
                    ctx.moveTo(0, -this.config.size/2);
                    ctx.lineTo(this.config.size/2, 0);
                    ctx.lineTo(0, this.config.size/2);
                    ctx.lineTo(-this.config.size/2, 0);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'SNIPER' || this.type === 'SPECIAL') {
                    // Square
                    ctx.fillRect(-this.config.size/2, -this.config.size/2, this.config.size, this.config.size);
                } else if (this.type === 'TANK') {
                    // Hexagon
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        const x = Math.cos(angle) * this.config.size/2;
                        const y = Math.sin(angle) * this.config.size/2;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'SHIELDED') {
                    // Octagon with shield effect
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        ctx.lineTo(Math.cos(angle) * this.config.size/2, Math.sin(angle) * this.config.size/2);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Shield ring
                    ctx.strokeStyle = '#0af';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.config.size * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (this.type === 'SCOUT') {
                    // Small fast triangle
                    ctx.beginPath();
                    ctx.moveTo(0, -this.config.size/2);
                    ctx.lineTo(this.config.size/2, this.config.size/2);
                    ctx.lineTo(-this.config.size/2, this.config.size/2);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'BOSS_MINI') {
                    // Large complex shape
                    ctx.beginPath();
                    ctx.moveTo(0, -this.config.size/2);
                    ctx.lineTo(this.config.size/2, -this.config.size/4);
                    ctx.lineTo(this.config.size/2, this.config.size/2);
                    ctx.lineTo(this.config.size/4, this.config.size/2);
                    ctx.lineTo(0, this.config.size/4);
                    ctx.lineTo(-this.config.size/4, this.config.size/2);
                    ctx.lineTo(-this.config.size/2, this.config.size/2);
                    ctx.lineTo(-this.config.size/2, -this.config.size/4);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Core glow
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // HP bar for tanks and bosses
                if (this.type === 'TANK' && this.hp < this.maxHp) {
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(-this.config.size/2, -this.config.size/2 - 10, this.config.size * (this.hp / this.maxHp), 3);
                }
                
                ctx.restore();
            }
        }
        
        // Enemy bullet class
        class EnemyBullet {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.width = 4;
                this.height = 4;
                this.active = true;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y < 0 || this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
                    this.active = false;
                }
            }
            
            draw() {
                ctx.fillStyle = '#f00';
                ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
            }
        }
        
        // Power-up class
        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 15;
                this.height = 15;
                this.active = true;
                this.pulse = 0;
                
                // Determine type
                this.type = Math.random() < GAME_CONFIG.DROP_CONFIG.SHIELD_CHANCE ? 'SHIELD' : 'WEAPON';
                this.color = this.type === 'SHIELD' ? GAME_CONFIG.SHIELD_CONFIG.STROKE : '#0f0';
            }
            
            update() {
                this.y += 1;
                this.pulse += 0.1;
                
                if (this.y > canvas.height) {
                    this.active = false;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.pulse);
                
                const scale = 1 + Math.sin(this.pulse * 2) * 0.2;
                ctx.scale(scale, scale);
                
                ctx.fillStyle = this.color;
                
                if (this.type === 'SHIELD') {
                    // Shield icon (circle)
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    // Weapon icon (square)
                    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-2, -2, 4, 4);
                }
                
                ctx.restore();
            }
        }
        
        // Game arrays
        let player;
        let bullets = [];
        let missiles = [];
        let rifles = [];
        let enemies = [];
        let enemyBullets = [];
        let powerUps = [];
        
        
        // Collision detection
        function checkCollision(obj1, obj2) {
            return Math.abs(obj1.x - obj2.x) < (obj1.width + obj2.width) / 2 &&
                   Math.abs(obj1.y - obj2.y) < (obj1.height + obj2.height) / 2;
        }
        
        // Spawn enemies from wave
        function spawnWaveEnemy(type) {
            const x = Math.random() * (canvas.width - 40) + 20;
            const y = -30;
            enemies.push(new Enemy(type, x, y));
        }

        // Wave management logic
        function updateWaves() {
            if (!isWaveActive) {
                if (currentWave < GAME_CONFIG.WAVES.length) {
                    startWave(currentWave);
                } else {
                    // All predefined waves finished, generate infinite wave or stay at last
                    startWave(GAME_CONFIG.WAVES.length - 1, true);
                }
            }

            if (isWaveActive) {
                waveTimer++;
                
                // Spawn enemies based on their delays
                waveEnemiesToSpawn.forEach(item => {
                    if (!item.spawned && waveTimer >= item.spawnTime) {
                        spawnWaveEnemy(item.type);
                        item.spawned = true;
                    }
                });

                // Check if wave is cleared (all spawned and all enemies dead)
                const allSpawned = waveEnemiesToSpawn.every(item => item.spawned);
                if (allSpawned && enemies.length === 0) {
                    isWaveActive = false;
                    currentWave++;
                    waveMessageTimer = 120; // Show "Wave Cleared" message for 2 seconds
                }
            }
        }

        function startWave(waveIndex, infinite = false) {
            const waveConfig = GAME_CONFIG.WAVES[waveIndex];
            waveEnemiesToSpawn = [];
            
            let totalDelay = 0;
            waveConfig.enemies.forEach(group => {
                for (let i = 0; i < group.count; i++) {
                    waveEnemiesToSpawn.push({
                        type: group.type,
                        spawnTime: totalDelay + (i * (group.delay / group.count)),
                        spawned: false
                    });
                }
                totalDelay += group.delay;
            });

            isWaveActive = true;
            waveTimer = 0;
            waveMessageTimer = 120; // Show "Wave X" message
            
            // Increase difficulty slightly each wave
            difficulty = 1 + (waveIndex * 0.2);
        }

        // Update HUD
        function updateHUD() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('weaponLevel').textContent = player.weaponLevel;
            document.getElementById('shields').textContent = player.shieldCharges;
            
            // Draw wave message on canvas if needed
            if (waveMessageTimer > 0) {
                waveMessageTimer--;
                ctx.save();
                ctx.fillStyle = 'rgba(0, 255, 0, ' + (waveMessageTimer / 120) + ')';
                ctx.font = 'bold 40px Courier New';
                ctx.textAlign = 'center';
                const waveName = currentWave < GAME_CONFIG.WAVES.length ? 
                               GAME_CONFIG.WAVES[currentWave].name : "Infinite Chaos";
                ctx.fillText(waveName, canvas.width / 2, canvas.height / 2);
                ctx.restore();
            }
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars background
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73 + gameTime * 0.1) % canvas.width;
                const y = (i * 37) % canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }
            
            // Update game time
            gameTime++;
            
            // Wave management
            updateWaves();
            
            // Update and draw power-ups
            powerUps = powerUps.filter(powerUp => {
                powerUp.update();
                powerUp.draw();
                
                if (checkCollision(player, powerUp)) {
                    if (powerUp.type === 'SHIELD') {
                        player.shieldCharges++;
                    } else {
                        player.upgradeWeapon();
                    }
                    return false;
                }
                return powerUp.active;
            });

            // Update HUD (including wave messages)
            updateHUD();
            
            // Update and draw particles
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return particle.life > 0;
            });
            
            // Update and draw player
            player.update();
            player.draw();
            
            // Update and draw bullets
            bullets = bullets.filter(bullet => {
                bullet.update();
                bullet.draw();
                
                // Check collision with enemies
                enemies.forEach(enemy => {
                    if (enemy.active && checkCollision(bullet, enemy)) {
                        bullet.active = false;
                        enemy.takeDamage();
                    }
                });
                
                return bullet.active;
            });
            
            // Update and draw missiles
            missiles = missiles.filter(missile => {
                missile.update();
                missile.draw();
                
                // Check collision with enemies
                enemies.forEach(enemy => {
                    if (enemy.active && checkCollision(missile, enemy)) {
                        missile.active = false;
                        enemy.takeDamage(2);
                    }
                });
                
                return missile.active;
            });

            // Update and draw rifles
            rifles = rifles.filter(rifle => {
                rifle.update();
                rifle.draw();
                
                // Check collision with enemies
                enemies.forEach(enemy => {
                    if (enemy.active && checkCollision(rifle, enemy)) {
                        rifle.active = false;
                        enemy.takeDamage(1);
                    }
                });
                
                return rifle.active;
            });
            
            // Update and draw enemies
            enemies = enemies.filter(enemy => {
                enemy.update();
                enemy.draw();
                
                // Check collision with player
                if (checkCollision(enemy, player)) {
                    enemy.active = false;
                    if (player.takeDamage()) {
                        endGame();
                    }
                    createExplosion(enemy.x, enemy.y, enemy.config.color, 25);
                }
                
                return enemy.active;
            });
            
            // Update and draw enemy bullets
            enemyBullets = enemyBullets.filter(bullet => {
                bullet.update();
                bullet.draw();
                
                // Check collision with player
                if (checkCollision(bullet, player)) {
                    bullet.active = false;
                    if (player.takeDamage()) {
                        endGame();
                    }
                    createExplosion(player.x, player.y, '#f00', 20);
                }
                
                return bullet.active;
            });
            
            document.getElementById('score').textContent = score;
            document.getElementById('weaponLevel').textContent = player.weaponLevel;
            
            requestAnimationFrame(gameLoop);
        }
        
        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // Right click for shield
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (gameRunning && player) {
                player.activateShield();
            }
        });
        
        // Game control functions
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');
            gameRunning = true;
            score = 0;
            currentWave = 0;
            isWaveActive = false;
            waveMessageTimer = 0;
            enemies = [];
            bullets = [];
            missiles = [];
            rifles = [];
            enemyBullets = [];
            powerUps = [];
            particles = [];
            player = new Player();
            gameTime = 0;
            difficulty = 1;
            requestAnimationFrame(gameLoop);
        }
        
        function restartGame() {
            document.getElementById('gameOver').classList.add('hidden');
            startGame();
        }
        
        function endGame() {
            gameRunning = false;
            
            // Check high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceShooterHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('newHighScore').classList.remove('hidden');
            } else {
                document.getElementById('newHighScore').classList.add('hidden');
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }
        
        function restartGame() {
            startGame();
        }
    </script>
</body>
