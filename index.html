<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Survivor Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            border: 2px solid #0f0;
            cursor: crosshair;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        
        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            z-index: 20;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #gameOver h2, #startScreen h2 {
            color: #0f0;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        #gameOver p, #startScreen p {
            font-size: 14px;
            margin: 8px 0;
        }
        
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            margin: 10px 0 0 0;
        }
        
        button:hover {
            background: #0a0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Score: <span id="score">0</span></div>
            <div>Weapon Level: <span id="weaponLevel">1</span></div>
            <div>Shields: <span id="shields">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        
        <div id="startScreen">
            <h2>RETRO SURVIVOR SPACE SHOOTER</h2>
            <p>Move mouse to control ship</p>
            <p>Auto-fire enabled</p>
            <p>Collect power-ups to upgrade weapons</p>
            <p>Right-click to activate shield</p>
            <button onclick="startGame()">START GAME</button>
        </div>
        
        <div id="gameOver" class="hidden">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p id="newHighScore" class="hidden">NEW HIGH SCORE!</p>
            <button onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Load all game modules -->
    <script src="image-loader.js"></script>
    <script src="shooting-patterns.js"></script>
    <script src="enemy-bullet.js"></script>
    <script src="movement-strategies.js"></script>
    <script src="render-strategies.js"></script>
    <script src="enemy-config.js"></script>
    <script src="wave-config.js"></script>
    <script src="weapon-config.js"></script>
    <script src="player-config.js"></script>
    <script src="game-config.js"></script>
    <script src="config.js"></script>
    <script src="effects.js"></script>
    <script src="weapons.js"></script>
    <script src="enemies.js"></script>
    <script src="player.js"></script>
    <script src="waves.js"></script>
    <script src="game.js"></script>
</body>
</html>
